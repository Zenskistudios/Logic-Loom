<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Loom</title>
    <link href="https://fonts.googleapis.com/css2? family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        :root {
           --bg-primary: #0a0a12;
			--bg-secondary: #12121e;
			--bg-glass: rgba(18, 18, 30, 0.75);
			--border-glass: rgba(0, 240, 255, 0.08);
			--color-true: #00f0ff;
			--color-false: #1a1a2e;
			--color-true-glow: 0 0 20px rgba(0, 240, 255, 0.4), 0 0 60px rgba(0,240,255, 0.1);
            --color-accent: #7b61ff;
            --color-accent-glow: 0 0 15px rgba(123,97, 255, 0.3);
            --color-danger: #ff4466;
            --color-danger-glow: 0 0 12px rgba(255, 68, 102, 0.3);
            --color-text: #e0e0e8;
            --color-text-dim: #5a5a72;
            --color-wire-true: #00f0ff;
            --color-wire-false: #1e1e32;
            --color-gate-bg: #16162a;
            --color-gate-border: #2a2a44;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            --font-sans: 'Inter', 'SF Pro', system-ui, sans-serif;
            --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: var(--font-mono);
			background: var(--bg-primary);
			color: var(--color-text);
			user-select: none
        }

        .top-bar {
            position:fixed;
            top:0;
            left:0;
            right:0;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 200;
            background: linear-gradient(100deg, var(--bg-primary) 60%, transparent);
            pointer-events: none;
        }

        .top-bar>*{
            pointer-events: auto;
        }

        .app-title {
            font-family: var(--font-mono);
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: .4;
            color: var(--color-text);
        }
        .top-action {
            display: flex;
            gap: .5rem;
            align-items: center;
        }

        .action-btn {
            font-family: var(--font-mono);
            font-size: .6rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color:var(--color-text-dim);
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: .45rem .9rem;
            cursor: pointer;
            transition: all .3s var(--ease-expo);
            white-space: nowrap;
        }

        .action-btn:hover {
            color: var(--color-true);
            border-color: rgba(0, 240, 255, 0.2)
            box-shadow: var(--color-true-glow)
        }

        .action-btn:focus-visible{
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .action-btn.danger:hover {
            color: var(--color-danger);
            border-color: rgb(255, 68, 102, 0.2);
            box-shadow: var(--color-danger--glow);
        }

        .action-btn:disabled {
            opacity: .3;
            pointer-events: none;
        }

        .canvas-viewport {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        .canvas-viewport.panning {
            cursor: grabbing
        }

        .canvas-world::before {
            content: '';
            position: absolute;
            left: -50000px;
			top: -50000px;
			width: 100000px;
			height: 100000px;
            background-image: radial-gradient(circle at 1px 1px, rgba(0, 240, 255, 0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .wire-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* hit-test SVG layar for wire clicks - sits over the canvas */

        .wire-hit-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            overflow: visible;
            pointer-events: none;
            z-index: 6
        }
        .wire-hit {
			fill: none;
			stroke: transparent;
			stroke-width: 16;
			stroke-linecap: round;
			pointer-events: visibleStroke;
			cursor: pointer
		}

		.wire-temp-layer {
			position: absolute;
			top: 0;
			left: 0;
			width: 1px;
			height: 1px;
			overflow: visible;
			pointer-events: none;
			z-index: 7
		}

		.wire-temp {
			fill: none;
			stroke: var(--color-accent);
			stroke-width: 2;
			stroke-dasharray: 6 6;
			opacity: .7;
			pointer-events: none
		}

        .wire-temp.wire-invalid {
			stroke: var(--color-danger);
			opacity: .5
		}

		.circuit-node {
			position: absolute;
			cursor: grab;
			z-index: 10;
			transition: box-shadow .3s var(--ease-expo)
		}

		.circuit-node:active {
			cursor: grabbing
		}

		.circuit-node:focus-visible {
			outline: 2px solid var(--color-accent);
			outline-offset: 3px;
			z-index: 15
		}

		.circuit-node.selected {
			z-index: 15
		}

		.circuit-node.selected::after {
			content: '';
			position: absolute;
			inset: -4px;
			border: 1.5px solid var(--color-accent);
			border-radius: inherit;
			pointer-events: none;
			opacity: .6
		}

		@keyframes node-appear {
			0% {
				opacity: 0;
				transform: scale(.5)
			}

			100% {
				opacity: 1;
				transform: scale(1)
			} 
        }

        @keyframes wire-reject {

            0%,
            100% {
                transform: translateX(0);
            }
            25%{
                transform: translateX(-4px);
            }
            75%{
                transform: translateX(4px);
            } 
        }

        .circuit-node.wire-rejected {
            animation: wire-reject .3s var(--ease-spring);
        }

        .node-input {
            width:90px;
            height: 72px;
            background: var(--color-gate-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: border-color .3s var(--ease-expo), box-shadow .3s var(--ease-expo);
        }

        .node-input.state-true {
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.06), var(--color-true-glow)
        }

        .node-input.node-label {
            font-size: .7rem;
            font-weight: 600;
            color: var(--color-text-dim);
            transition: color .3s var(--ease-expo);
        }

        .node-input.state-true .node-label {
            color: var(--color-true);
        }

        .node-toggle {
            width: 32px;
            height:18px;
            background: var(--bg-secondary);
            border: 1.5px solid var(--color-gate-border);
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            transition: all .3sec var(--ease-spring)
        }

        .node-toggle:focus-visible{
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .node-toggle::after{
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-text-dim);
            top: 1.5px;
            left: 2px;
            transition: all .3s var(--ease-spring)
        }

        .node-input.state-true .node-toggle {
			background: rgba(0, 240, 255, 0.12);
			border-color: var(--color-true)
		}

        .node-input.state-true .node-toggle::after {
            left: 16px;
            background: var(--color-true);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.5)
        }

        .node-input .input-val-label {
            font-size: .5rem;
            font-weight: 600;
            color: var(--color-text-dim);
            transition: color .3s var(--ease-expo);
        }

        .node-input.state-true .input-val-label {
            color: var(--color-true);
        }

        .state-icon {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-text-dim);
            margin-right: 2px;
            vertical-align: middle;
            transition: background .3s var(--ease-expo), box-shadow .3s var(--ease-expo)
        }

        .state-icon.active {
            background: var(--color-true);
            box-shadow: 0 0 6px rgba(0, 240, 255, 0.5)
        }

        .node-gate {
            width: 120px;
            height: 80px;
            background: var(--color-gate-bg);
            border: 1.5px solid var(--color-gate-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: border-color .3s var(--ease-expo), box-shadow .3s var(--ease-expo)
        }

        .node-gate.output-true {
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.05), 0 0 15px rgba(0, 240, 255, 0.08)
        }

        .node-gate .gate-symbol {
            width: 38px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-dim);
            transition: transform .3s var(--ease-expo), color .3s var(--ease-expo);
        }

        .node-gate.output-true .gate-symbol {
            color: var(--color-true)
        }
        .node-gate .gate-symbol svg {
            width: 100%;
            height: 100%
        }

        .node-gate .gate-type-label {
            font-size: .55rem;
            font-weight: 600;
            color: var(--color-text-dim);
            letter-spacing: .1em;
            transition: color .3s var(--ease-expo)
        }

        .node-gate.output-true .gate-type-label {
            color: rgba(0, 240, 255, 0.05)
        }

        .gate-tooltip{
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: .5rem .7rem;
            font-size: .5rem;
            color: var(--color-text-dim);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all .25s var(--ease-expo);
            z-index: 50
        }

        .gate-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%)
            border: 5px solid transparent;
			border-top-color: rgba(0, 240, 255, 0.08)
        }

        .node-gate:hover .gate-tooltip,
        .node-gate:focus-within .gate-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .gate-tooltip table {
            border-collapse: collapse
        }

        .gate-tooltip th,
        .gate-tooltip td {
            padding: 1px 5px;
            text-align: center;
        }

        .gate-tooltip th {
            color: var(--color-true);
            border-bottom: 1px solid var(--bg-glass)
        }

        .gate-tooltip td.v1 {
            color: var(--color-true)
        }

        .node-output {
            width: 72px;
            height: 72px;
            background: var(--color-gate-bg);
            border: 1.5px solid var(--color-gate-border);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: border-color .3s var(--ease-expo), box-shadow .4s var(--ease-expo), background .3s var(--ease-expo)
        }

        .node-output.state-true {
            border-color: var(--color-true);
            background: rgba(0, 240, 255, 0.06);
            box-shadow: var(--color-true-glow);
            animation: led-breathe 2.2s ease-in-out infinite
        }

        @keyframes led-breathe {
            0%,
            100% {box-shadow: 0 0 20px rgba(0, 240, 255, 0..35), 0 0 50px rgba(0, 240, 255, 0.08)
            }
            50% {box-shadow: 0 0 30px rgba(0, 240, 255, 0.5), 0 0 70px rgba(0, 240, 255, 0.12)
            }
        }

        .node-output.node-label {
            font-size: .7rem;
            font-weight: 600;
            color: var(--color-text-dim);
            transition: color .3s var(--ease-expo)
        }

        .node-output.state-true .node-label {
            color: var(--color-true);
        }

        .node-output .output-val {
            font-size: 1rem;
            font-weight:600;
            color: var(--color-text-dim);
            transition: color .3s var(--ease-expo);
        }

        .node-output.state-true .output-val {
            color: var(--color-true)
        }

        .node-output::before{
            content:'';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(255, 255, 255 0.1), transparent);
            top: 10x;
            left: 16px;
            pointer-events: none
        }

        .node-output.selected::after {
            border-radius: 50%
        }

        .port {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1.5px solid var(--color-gate-border);
            cursor: crosshair;
            z-index: 20;
            transition: background .2s var(--ease-expo), border-color .2s var(--ease-expo), box-shadow .2s var(--ease-expo)
        }

        .port::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 50%
        }

x		.port:hover,
		.port.highlight {
			border-color: var(--color-accent);
			background: rgba(123, 97, 255, 0.25);
			box-shadow: var(--color-accent-glow)
		}

		.port.port-active {
			background: var(--color-true);
			border-color: var(--color-true);
			box-shadow: 0 0 8px rgba(0, 240, 255, 0.5)
		}

		.node-input .port.port-out {
			left: calc(100% - 5px);
			top: calc(50% - 5px)
		}

        .node-output .port.port-in {
            left: -5px;
            top: calc(50% - 5px)
        }

        .node-gate .port.port-in-a {
            left: -5px;
            top: calc(22% - 5px)
        }

        .node-gate .port.port-in-b {
            left: -5px;
            top: calc(66% - 5px)
        }

        .node-gate .port.port-out {
            left: calc(100% - 5px);
            top: calc(50% - 5px)
        }

        .node-gate[data-gate-type="NOT"] .port.port-in-b {
          opacity: .12;
          pointer-events: none;
        }

        .delete-hint {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 18px;
            height: 18px;
            background: var(--color-danger);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            font-size: .55rem;
            color: white;
            font-weight: 600;
            line-height: 1;
            box-shadow: var(--color-danger-glow);
            border: none;
            font-family: var(--font-mono);
        }

        .delete-hint:focus-visible {
			outline: 2px solid white;
			outline-offset: 2px
		}

		.circuit-node.selected .delete-hint {
			display: flex
		}

		.toolbox {
			position: fixed;
			top: 50%;
			left: 1rem;
			transform: translateY(-50%);
			z-index: 100;
			display: flex;
			flex-direction: column;
			gap: .4rem;
			background: var(--bg-glass);
			backdrop-filter: blur(20px) saturate(1.2);
			border: 1px solid var(--border-glass);
			border-radius: 14px;
			padding: .6rem
		}

		.toolbox-label {
			font-family: var(--font-sans);
			font-size: .5rem;
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: .15em;
			color: var(--color-text-dim);
			text-align: center;
			padding-bottom: .3rem;
			border-bottom: 1px solid var(--border-glass);
			margin-bottom: .2rem
		}

        .tool-btn {
            width: 48px;
            height: 42px;
            background: var(--color-gate-bg);
            border: 1px solid var(--color-gate-border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: var(--color-text-dim);
            transition: all .25s var(--ease-expo);
            font-family: var(--font-mono);
        }

        .tool-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            box-shadow: var(--color-accent-glow);
            transform: scale(1.00)
        }

        .tool-btn:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .tool-btn:active {
            transform: scale(.95)
        }

        .tool-btn svg {
            width: 22px;
            height: 16px
        }

        .tool-btn .tool-label {
            font-size: .4rem;
            font: weight 600px;
            letter-spacing: .06em
        }

        .truth-panel {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 100;
            max-width: 400px;
            width: 92vw;
            font-family: var(--font-mono)
        }

        .truth-panel summary {
			font-family: var(--font-sans);
			font-size: .65rem;
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: .12em;
			color: var(--color-text-dim);
			cursor: pointer;
			padding: .55rem .9rem;
			background: var(--bg-glass);
			backdrop-filter: blur(20px) saturate(1.2);
			border: 1px solid var(--border-glass);
			border-radius: 12px;
			list-style: none;
			display: flex;
			align-items: center;
			gap: .5rem;
			transition: all .3s var(--ease-expo)
		}

        .truth-panel summary::-webkit-details-marker {
			display: none
		}

		.truth-panel summary::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 5px;
			border-right: 1.5px solid var(--color-text-dim);
			border-bottom: 1.5px solid var(--color-text-dim);
			transform: rotate(-135deg);
			transition: transform .3s var(--ease-spring)
		}

		.truth-panel[open] summary::before {
			transform: rotate(45deg)
		}

		.truth-panel summary:hover {
			color: var(--color-true);
			border-color: rgba(0, 240, 255, 0.15)
		}

		.truth-panel summary:focus-visible {
			outline: 2px solid var(--color-accent);
			outline-offset: 2px
		}

		.truth-table-wrap {
			margin-top: .4rem;
			background: var(--bg-glass);
			backdrop-filter: blur(20px) saturate(1.2);
			border: 1px solid var(--border-glass);
			border-radius: 12px;
			padding: .6rem;
			max-height: 260px;
			overflow-y: auto;
			scrollbar-width: thin;
			scrollbar-color: var(--color-gate-border) transparent
		}

		.truth-table-wrap::-webkit-scrollbar {
			width: 4px
		}

		.truth-table-wrap::-webkit-scrollbar-track {
			background: transparent
		}

		.truth-table-wrap::-webkit-scrollbar-thumb {
			background: var(--color-gate-border);
			border-radius: 2px
		}

		.truth-table {
			width: 100%;
			border-collapse: collapse;
			font-size: .55rem
		}

		.truth-table th {
			color: var(--color-true);
			font-weight: 600;
			padding: 3px 6px;
			text-align: center;
			border-bottom: 1px solid var(--border-glass);
			position: sticky;
			top: 0;
			background: var(--bg-secondary);
			z-index: 2
		}

		.truth-table td {
			padding: 2px 6px;
			text-align: center;
			color: var(--color-text-dim);
			border-bottom: 1px solid rgba(255, 255, 255, 0.015)
		}

		.truth-table td.v1 {
			color: var(--color-true)
		}

		.truth-table tr.active-row {
			background: rgba(0, 240, 255, 0.06)
		}

		.truth-table tr.active-row td {
			color: var(--color-text)
		}

		.truth-table tr.active-row td.v1 {
			color: var(--color-true);
			text-shadow: 0 0 8px rgba(0, 240, 255, 0.4)
		}

		.truth-empty {
			text-align: center;
			padding: 1.5rem 0;
			color: var(--color-text-dim);
			font-size: .6rem;
			font-style: italic
		}

		.inspector {
			position: fixed;
			bottom: 1rem;
			left: 5rem;
			z-index: 100;
			background: var(--bg-glass);
			backdrop-filter: blur(20px) saturate(1.2);
			border: 1px solid var(--border-glass);
			border-radius: 12px;
			padding: .6rem .9rem;
			font-size: .55rem;
			color: var(--color-text-dim);
			min-width: 165px;
			max-width: 240px;
			transition: opacity .3s var(--ease-expo)
		}

		.inspector.hidden {
			opacity: 0;
			pointer-events: none
		}

		.inspector-title {
			font-family: var(--font-sans);
			font-size: .55rem;
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: .12em;
			color: var(--color-text-dim);
			margin-bottom: .4rem
		}

        .inspector-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            gap: .5rem
        }

        .inspector-key {
            color: var(--color-text-dim)
        }

        .inspector-val {
            color: var(--color-text);
            font-weight: 600
        }

        .inspector-val.val-true {
            color: var(--color-true)
        }

        .zoom-indicator {
			position: fixed;
			bottom: 1rem;
			left: 50%;
			transform: translateX(-50%);
			z-index: 100;
			font-size: .55rem;
			color: var(--color-text-dim);
			background: var(--bg-glass);
			backdrop-filter: blur(20px) saturate(1.2);
			border: 1px solid var(--border-glass);
			border-radius: 8px;
			padding: .3rem .7rem;
			opacity: .5
		}

        .undo-toast {
			position: fixed;
			bottom: 3.5rem;
			left: 50%;
			transform: translateX(-50%) translateY(20px);
			z-index: 300;
			background: var(--bg-glass);
			backdrop-filter: blur(20px) saturate(1.2);
			border: 1px solid var(--border-glass);
			border-radius: 10px;
			padding: .5rem 1rem;
			font-family: var(--font-mono);
			font-size: .6rem;
			color: var(--color-text-dim);
			display: flex;
			align-items: center;
			gap: .7rem;
			opacity: 0;
			pointer-events: none;
			transition: all .3s var(--ease-expo)
		}

        .undo-toast.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0)
        }

        .undo-toast-btn {
            font-family: var(--font-mono);
            font-size: .55rem;
            font-weight: 600;
            color: var(--color-accent);
            background: none;
            border: 1px solid rgba(123,97, 255, 0.3);
            border-radius: 6px;
            padding: .25rem .6rem;
            cursor: pointer;
            transition: all .2s var(--ease-expo)
        }

        .undo-toast-btn:hover {
            background: rgba(123, 97, 255, 0.1)
        }
        
        .undo-toast-btn:focus-visible {
			outline: 2px solid var(--color-accent);
			outline-offset: 2px
		}

		.context-menu {
			position: fixed;
			z-index: 300;
			background: var(--bg-glass);
			backdrop-filter: blur(24px) saturate(1.3);
			border: 1px solid var(--border-glass);
			border-radius: 10px;
			padding: .4rem;
			min-width: 150px;
			display: none;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)
		}

        .content-menu.visible {
            display: block
        }

        .ctx-item {
            font-family: var(--font-mono);
            font-size: .6rem;
            color: var(--color-text-dim);
            padding: .4rem .7rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all .15s var(--ease-expo);
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
        }

        .ctx-item:hover {
            background: rgba(123, 97, 255, 0.1);
            color: var(--color-accent)
        }

       .ctx-item.ctx-changer:hover {
            background: rgba(255, 60, 102, 0.1);
            color: var(--color-danger)
       }

       .ctx-sep {
        height: 1px;
        background: var(--border-glass);
        margin: .3rem 0
       }

       @keyframes gate-morph {
			0% {
				transform: scale(1) rotate(0)
			}

			40% {
				transform: scale(.78) rotate(-12deg)
			}

			100% {
				transform: scale(1) rotate(0)
			}
		}

		.gate-symbol.morphing {
			animation: gate-morph .35s var(--ease-spring)
		}

		.sr-only {
			position: absolute;
			width: 1px;
			height: 1px;
			padding: 0;
			margin: -1px;
			overflow: hidden;
			clip: rect(0, 0, 0, 0);
			white-space: nowrap;
			border: 0
		}

		.selection-box {
			position: absolute;
			border: 1.5px dashed var(--color-accent);
			background: rgba(123, 97, 255, 0.06);
			pointer-events: none;
			z-index: 50;
			border-radius: 2px
		}

		@media(max-width:768px) {
			.toolbox {
				top: auto;
				bottom: 5rem;
				left: 50%;
				transform: translateX(-50%);
				flex-direction: row
			}

			.toolbox-label {
				display: none
			}

			.truth-panel {
				max-width: 95vw;
				right: .5rem
			}

			.inspector {
				display: none
			}
		}
    </style>
</head>

<body>
    <header class="top-bar" role="banner">
        <span class="app-title">Logic Loom</span>
        <div class="top-action">
            <button class="action-btn" id="btn-undo" aria-label="undo (Crtl+Z)" disabled>Undo</button>
            <button class="action-btn" id="btn-redo" aria-label="redo (Crtl+Y)" disabled>Redo</button>
            <button class="action-btn" id="btn-save" aria-label="save circuit">Save</button>
            <button class="action-btn" id="btn-load" aria-label="load circuit">Load</button>
            <button class="action-btn" id="btn-randomize" aria-label="randomize inputs">Randomize</button>
            <button class="action-btn" id="btn-clear-wires" aria-label="Clear all wires">Clear Wires</button>
            <button class="action-btn" id="btn-reset" aria-label="Reset circuit">Reset All</button>
        </div>
    </header>

    <nav class="toolbox" id="toolbox" aria-label="Component palette" role="toolbar">
        <span class="toolbox-label">Add</span>
        <button class="tool-btn" data-spawn="INPUT" aria-label="Add input">
            <svg viewBox="0 0 22 16" aria-hidden="true">
                <circle cx="7" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.2" />
                <line x1="11" y1="8" x2="20" y2="8" stroke="currentColor" stroke-width="1.2" />
			</svg><span class="tool-label">IN</span></button>
		<button class="tool-btn" data-spawn="AND" aria-label="Add AND gate"><svg viewBox="0 0 22 16" aria-hidden="true">
				<path d="M2 1H11A7 7 0 0 1 11 15H2Z" fill="none" stroke="currentColor" stroke-width="1.2" />
                </svg><span class="tool-label">AND</span></button>
                <button class="tool-btn" data-spawn="OR" aria-label="Add OR gate"><svg viewBox="0 0 22 16" aria-hidden="true">
                <path d="M2 1Q6 8 2 15Q12 15 18 8Q12 1 2 1Z" fill="none" stroke="currentColor" stroke-width="1.2" />
                </svg><span class="tool-label">OR</span></button>
                <button class="tool-btn" data-spawn="XOR" aria-label="Add XOR gate">
                    <svg view="0 0 22 16" aria-hidden="true">
                        <path d="M4 1Q8 8 4 15Q14 15 20 8Q14 1 4 1Z" fill="none" stroke="currentColor" stroke-width="1.2" />
                        <path d="M1 1Q5 8 1 15"fill="none" stroke="currentColor" stroke-width="1.2" />
                    </svg><span class="tool-label">XOR</span></button>
                    <button class="tool-btn" data-spawn="NAND" aria-label="Add NAND gate"><svg viewBox="0 0 24 16" aria-hidden="true">
                        <path d="M2 1H10A7 7 0 0 1 10 15H2Z" fill="none" stroke="currentColor" stroke-width="1.2" />
                        <circle cx="19" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.2" />
                    </svg> <span class="tool-label">NAND</span></button>
                    <button class="tool-btn" data-spawn="NOT" aria-label="Add NOT gate"> <svg viewBox="0 0 22 16" aria-hidden="true">
                        <circle cx="19" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.2" />
                        </svg> <span class="tool-label">NOT</span></button>
                        <button class="tool-btn" data-spawn="OUTPUT" aria-label="Add output"><svg viewBox="0 0 22 16" aria-hidden="true">
				<circle cx="11" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.2" />
                <circle cx="11" cy="8" r="2" fill="currentColor" opacity=".4" />
                        </svg> <span class="tool-label">OUT</span></button>
                        </nav>

                        <section class="canvas-viewport" id="viewport" role="application" aria-label="Circuit canvas">
                            <div class="canvas-world" id="world">
                                <canvas class="wire-canvas" id="wireCanvas"></canvas>
                                <svg class="wire-hit-layer" id="wire-hit-layer" xmlns="https://www.w3.org/2000/svg" aria-hidden="true"></svg>
                                <svg class="wire-temp-layer" id="wire-temp-layer" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
		</div>
	</section>

    <div class="content-menu" id="context-menu" role="menu" aria-label="Node actions">
        <button class="ctx-item" data-action="cycle" role="menuitem"> Cycle Gate Type</button>
        <button class="ctx-item" data-action="duplicate" role="menuitem">Duplicate</button>
		<div class="ctx-sep" role="separator"></div>
		<button class="ctx-item ctx-danger" data-action="delete" role="menuitem">Delete Node</button>
	</div>

    <aside class="inspector hidden" id="inspector" aria-live="polite" aria- label="signal inspector">
